<!DOCTYPE html>
<html>
<head>
    <title>Máy Quét CCCD (Bản Ổn Định)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background: #111; color: white; }
        h2 { color: #00ffcc; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        #reader { width: 100%; max-width: 450px; margin: 0 auto; border: 3px solid #00ffcc; border-radius: 12px; overflow: hidden; background: #222; box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); min-height: 250px; position: relative; }
        #result-text { margin-top: 20px; font-size: 18px; font-weight: bold; color: #ffcc00; min-height: 50px; }
        .btn-restart { margin-top: 15px; padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: none; margin-left: auto; margin-right: auto;}
    </style>
</head>
<body>

    <h2>Máy Quét CCCD Tự Động</h2>
    <p>Hệ thống tự động tối ưu camera</p>

    <div id="reader"></div>
    
    <div id="result-text">⏳ Đang yêu cầu quyền Camera...</div>
    
    <button id="btn-restart" class="btn-restart" onclick="location.reload()">🔄 Khởi động lại trang</button>

    <script>
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfRVneQJMf8TXq0U4aCOgodTxRNiCZk5wnCNjZuuDWBveiMXA/viewform"; 
        const ENTRY_ID = "1065046570";
        const ENTRY_TEN = "2005620554";
        const ENTRY_NGAY = "1045781291";

        let html5QrCode;

        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");

            // Cấu hình linh hoạt: Ưu tiên camera sau, không ép cứng độ phân giải để tránh treo máy
            const cameraConfig = { facingMode: "environment" };

            html5QrCode.start(
                cameraConfig,
                {
                    fps: 15,
                    qrbox: { width: 250, height: 250 },
                    experimentalFeatures: { useBarCodeDetectorIfSupported: true } // Kích hoạt AI nếu máy có
                },
                (decodedText) => {
                    // Dừng camera ngay khi quét thành công
                    html5QrCode.stop(); 
                    
                    try {
                        const parts = decodedText.split('|');
                        if(parts.length < 4) throw new Error("Mã không đúng");

                        const id = parts[0];
                        const ten = encodeURIComponent(parts[2]);
                        const tenHienThi = parts[2];
                        const rawDate = parts[3];
                        const formattedDate = `${rawDate.substring(4, 8)}-${rawDate.substring(2, 4)}-${rawDate.substring(0, 2)}`;

                        const finalUrl = `${FORM_URL}?entry.${ENTRY_ID}=${id}&entry.${ENTRY_TEN}=${ten}&entry.${ENTRY_NGAY}=${formattedDate}`;

                        document.getElementById('result-text').innerHTML = `✅ Quét thành công: <span style="color: #00ffcc;">${tenHienThi}</span><br>Đang mở Form...`;
                        
                        setTimeout(() => window.location.href = finalUrl, 1000);
                    } catch (error) {
                        document.getElementById('result-text').innerHTML = "❌ Mã không hợp lệ. Vui lòng tải lại trang.";
                        document.getElementById('btn-restart').style.display = "block";
                    }
                },
                (errorMessage) => {
                    // Ẩn các lỗi quét dò tìm nền
                }
            ).then(() => {
                // Chỉ hiện chữ "Đang quét" KHI CAMERA ĐÃ THỰC SỰ MỞ LÊN
                document.getElementById('result-text').innerText = "Đang quét... Hãy đưa CCCD vào giữa màn hình.";
            }).catch((err) => {
                // Báo lỗi rõ ràng nếu bị chặn quyền camera
                document.getElementById('result-text').innerHTML = "❌ Lỗi: Không thể mở Camera.<br>Hãy đảm bảo bạn đã CẤP QUYỀN CAMERA cho trang web này!";
                document.getElementById('btn-restart').style.display = "block";
            });
        }

        window.onload = startCamera;
    </script>
</body>
</html>
